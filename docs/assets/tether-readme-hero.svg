<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title description">
  <title id="title">TETHER — Keep the thread.</title>
  <desc id="description">The TETHER endpoint logo, product wordmark, and the line: Turn the browser chat already in front of you into a tab-bound endpoint for Codex.</desc>
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F05A2A"/>
      <stop offset="0.32" stop-color="#F05A2A"/>
      <stop offset="0.32" stop-color="#3B3934"/>
      <stop offset="1" stop-color="#3B3934"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#F3EFE4" stroke-opacity="0.035"/>
    </pattern>
  </defs>

  <rect width="1400" height="620" rx="26" fill="#171714"/>
  <rect width="1400" height="620" rx="26" fill="url(#grid)"/>
  <path d="M0 594H1400" stroke="url(#edge)" stroke-width="6"/>

  <g transform="translate(92 70)">
    <rect width="128" height="128" rx="28" fill="#171714" stroke="#3B3934" stroke-width="2"/>
    <path d="M30 51.5 90 44.5" fill="none" stroke="#F3EFE4" stroke-width="8" stroke-linecap="round"/>
    <path d="M60 48v41" fill="none" stroke="#F3EFE4" stroke-width="8" stroke-linecap="round"/>
    <circle cx="27" cy="52" r="13" fill="#171714" stroke="#F3EFE4" stroke-width="8"/>
    <circle cx="94" cy="44" r="18" fill="#F05A2A"/>
  </g>

  <text x="256" y="190" fill="#F3EFE4" font-family="Arial Black, Helvetica, sans-serif" font-size="150" font-weight="900" letter-spacing="-9">
    <tspan>TET</tspan><tspan fill="#F05A2A">H</tspan><tspan>ER</tspan>
  </text>

  <text x="92" y="352" fill="#F3EFE4" font-family="Georgia, Times New Roman, serif" font-size="76" letter-spacing="-3">Keep the thread.</text>
  <text x="96" y="423" fill="#AAA69B" font-family="Arial, Helvetica, sans-serif" font-size="31">Turn the browser chat already in front of you into a</text>
  <text x="96" y="468" fill="#AAA69B" font-family="Arial, Helvetica, sans-serif" font-size="31">tab-bound endpoint for Codex.</text>

  <g fill="#AAA69B" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="3">
    <text x="96" y="548">LOCAL BRIDGE</text>
    <text x="310" y="548">TAB BOUND</text>
    <text x="500" y="548">INTERACTION GUARDED</text>
  </g>
  <circle cx="78" cy="543" r="7" fill="#F05A2A"/>
</svg>
